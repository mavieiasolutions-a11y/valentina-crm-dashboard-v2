<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📞 Dashboard de Llamadas - Valentina Hernández</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        header {
            background: #2c3e50;
            color: white;
            padding: 25px;
            text-align: center;
        }
        header h1 {
            font-size: 2rem;
            margin-bottom: 5px;
        }
        .welcome {
            font-style: italic;
            opacity: 0.8;
        }
        .form-section, .calls-section {
            padding: 25px;
        }
        .form-section {
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }
        .call-form {
            display: grid;
            gap: 15px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: 600;
            margin-bottom: 5px;
            color: #333;
        }
        input, select, textarea {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #3498db;
        }
        button {
            padding: 12px 25px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border-left: 4px solid #3498db;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .stat-card.positive { border-left-color: #27ae60; }
        .stat-card.negative { border-left-color: #e74c3c; }
        .stat-card.demo { border-left-color: #9b59b6; }
        .stat-card h3 {
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-bottom: 5px;
        }
        .stat-card p {
            font-size: 1.8rem;
            font-weight: bold;
            color: #2c3e50;
        }
        .table-container {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid #eee;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #2c3e50;
        }
        tr:hover { background: #f8f9fa; }
        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .status-yes { background: #d4edda; color: #155724; }
        .status-no { background: #f8d7da; color: #721c24; }
        .status-demo { background: #e8d7f8; color: #4a2c6d; }
        .status-callback { background: #fff3cd; color: #856404; }
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        .success { background: #27ae60; }
        .error { background: #e74c3c; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .empty {
            text-align: center;
            color: #7f8c8d;
            font-style: italic;
            padding: 40px;
        }
        @media (max-width: 768px) {
            body { padding: 10px; }
            .container { margin: 0; }
            .stats { grid-template-columns: repeat(2, 1fr); }
            th, td { padding: 8px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📞 Dashboard de Llamadas</h1>
            <p class="welcome">Bienvenida, Valentina Hernández Taborda</p>
        </header>

        <section class="form-section">
            <h2>🏃‍♀️ Registrar Nueva Llamada</h2>
            <form id="callForm" class="call-form">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label for="phoneNumber">📱 Número de Teléfono</label>
                        <input type="text" id="phoneNumber" placeholder="+57 300 123 4567" required>
                    </div>
                    <div class="form-group">
                        <label for="companyName">🏢 Nombre de la Empresa</label>
                        <input type="text" id="companyName" placeholder="TechCorp S.A." required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="status">📊 Resultado de la Llamada</label>
                    <select id="status" required>
                        <option value="">Seleccione el resultado...</option>
                        <option value="Sí">✅ Sí - Interesado</option>
                        <option value="No">❌ No - No interesado</option>
                        <option value="Demo">🎯 Demo - Solicita demostración</option>
                        <option value="Volver a llamar">⏰ Volver a llamar</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="notes">📝 Notas adicionales</label>
                    <textarea id="notes" placeholder="Detalles de la conversación, comentarios importantes..."></textarea>
                </div>
                <button type="submit">➕ Agregar Llamada</button>
            </form>
        </section>

        <section class="calls-section">
            <h2>📈 Estadísticas de Llamadas</h2>
            <div class="stats">
                <div class="stat-card">
                    <h3>Total Llamadas</h3>
                    <p id="totalCalls">0</p>
                </div>
                <div class="stat-card positive">
                    <h3>Sí</h3>
                    <p id="yesCalls">0</p>
                </div>
                <div class="stat-card negative">
                    <h3>No</h3>
                    <p id="noCalls">0</p>
                </div>
                <div class="stat-card demo">
                    <h3>Demos</h3>
                    <p id="demoCalls">0</p>
                </div>
            </div>

            <h2>📋 Historial Completo</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Teléfono</th>
                            <th>Empresa</th>
                            <th>Resultado</th>
                            <th>Notas</th>
                            <th>Fecha y Hora</th>
                        </tr>
                    </thead>
                    <tbody id="callRecords">
                        <tr><td colspan="5" class="empty">Cargando llamadas...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        const API_BASE = '/api';

        // Mostrar mensajes
        function showMessage(message, type = 'info') {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = message;
            document.body.appendChild(messageDiv);
            setTimeout(() => messageDiv.remove(), 3000);
        }

        // Agregar nueva llamada
        document.getElementById('callForm').addEventListener('submit', async (event) => {
            event.preventDefault();

            const phoneNumber = document.getElementById('phoneNumber').value.trim();
            const companyName = document.getElementById('companyName').value.trim();
            const status = document.getElementById('status').value;
            const notes = document.getElementById('notes').value.trim();

            try {
                const response = await fetch(`${API_BASE}/calls`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        phoneNumber,
                        companyName,
                        status,
                        notes
                    })
                });

                if (response.ok) {
                    showMessage('✅ Llamada registrada exitosamente!', 'success');
                    document.getElementById('callForm').reset();
                    loadCalls();
                } else {
                    const errorData = await response.json();
                    showMessage(`❌ ${errorData.error || 'Error registrando la llamada'}`, 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('❌ Error de conexión. Revisa tu conexión a internet.', 'error');
            }
        });

        // Cargar y mostrar llamadas
        async function loadCalls() {
            try {
                const response = await fetch(`${API_BASE}/calls`);
                if (!response.ok) throw new Error('Error cargando llamadas');

                const calls = await response.json();
                updateCallsTable(calls);
                updateStats(calls);
            } catch (error) {
                console.error('Error cargando llamadas:', error);
                document.getElementById('callRecords').innerHTML =
                    '<tr><td colspan="5" class="empty">❌ Error cargando las llamadas</td></tr>';
            }
        }

        function updateCallsTable(calls) {
            const callRecords = document.getElementById('callRecords');

            if (calls.length === 0) {
                callRecords.innerHTML = '<tr><td colspan="5" class="empty">No hay llamadas registradas aún</td></tr>';
                return;
            }

            callRecords.innerHTML = calls.map(call => `
                <tr>
                    <td>${call.phoneNumber}</td>
                    <td>${call.companyName}</td>
                    <td><span class="status-badge ${getStatusClass(call.status)}">${call.status}</span></td>
                    <td>${call.notes || '-'}</td>
                    <td>${formatDate(call.date)}</td>
                </tr>
            `).join('');
        }

        function updateStats(calls) {
            const total = calls.length;
            const yes = calls.filter(c => c.status === 'Sí').length;
            const no = calls.filter(c => c.status === 'No').length;
            const demo = calls.filter(c => c.status === 'Demo').length;

            document.getElementById('totalCalls').textContent = total;
            document.getElementById('yesCalls').textContent = yes;
            document.getElementById('noCalls').textContent = no;
            document.getElementById('demoCalls').textContent = demo;
        }

        function getStatusClass(status) {
            const classes = {
                'Sí': 'status-yes',
                'No': 'status-no',
                'Demo': 'status-demo',
                'Volver a llamar': 'status-callback'
            };
            return classes[status] || '';
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('es-ES', {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // Cargar llamadas al iniciar
        document.addEventListener('DOMContentLoaded', () => {
            loadCalls();
        });
    </script>
</body>
</html>
